name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  # Must stay aligned with the ONNX Runtime headers bundled by
  # github.com/yalue/onnxruntime_go in go.mod.
  ONNXRUNTIME_VERSION: "1.25.0"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: cc-search-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: cc-search-darwin-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            binary: cc-search-darwin-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ONNX Runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz
          tar xzf onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz
          find onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}/lib -maxdepth 1 \( -type f -o -type l \) -name '*.so*' -exec sudo cp -P {} /usr/local/lib/ \;
          sudo ldconfig

      - name: Install ONNX Runtime (macOS arm64)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}.tgz
          tar xzf onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}.tgz
          find onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}/lib -maxdepth 1 \( -type f -o -type l \) -name '*.dylib*' -exec sudo cp -P {} /opt/homebrew/lib/ \;

      - name: Install ONNX Runtime (macOS x64)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        run: brew install onnxruntime

      - name: Export ONNX model
        run: |
          python -m pip install huggingface_hub transformers
          python scripts/export-model.py

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/cc-search

      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.binary }} > ${{ matrix.binary }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: |
            ${{ matrix.binary }}
            ${{ matrix.binary }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
