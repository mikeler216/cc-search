name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Must stay aligned with the ONNX Runtime headers bundled by
  # github.com/yalue/onnxruntime_go in go.mod.
  ONNXRUNTIME_VERSION: "1.25.0"

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: macos-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ONNX Runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz
          tar xzf onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz
          sudo cp onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}/lib/* /usr/local/lib/
          sudo ldconfig

      - name: Install ONNX Runtime (macOS arm64)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}.tgz
          tar xzf onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}.tgz
          sudo cp onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}/lib/* /opt/homebrew/lib/

      - name: Export ONNX model
        run: |
          python -m pip install huggingface_hub transformers
          python scripts/export-model.py

      - name: Build
        run: CGO_ENABLED=1 go build ./cmd/cc-search

      - name: Test
        run: CGO_ENABLED=1 go test ./... -v -count=1 -timeout 300s

      - name: Vet
        run: go vet ./...
